[dpdk]
lcore_mask=1
channel=4
memory=128
no_huge=0
promiscuous=1
numa_on=1
tso=0
vlan_strip=1
vlan_filter=10
nb_vdev=1
nb_bond=0
log_level=4
fstack_log_level=7
fstack_log_file_prefix=./test_log_
idle_sleep=20
pkt_tx_delay=100
symmetric_rss=1
port_list=0

[port0]
addr=192.168.1.10
netmask=255.255.255.0
broadcast=192.168.1.255
gateway=192.168.1.1
if_name=ens0
lcore_list=0
vip_addr=10.0.0.1,10.0.0.2,10.0.0.3
vip6_addr=fe80::1,fe80::2

[vlan0]
vlan_id=10
addr=10.0.10.10
netmask=255.255.255.0
broadcast=10.0.10.255
gateway=10.0.10.1

[vdev0]
iface=net_pcap0,iface=eth0
path=/tmp/x

[freebsd.boot]
hz=100
physmem=268435456
fd_reserve=1024
mem_size=256
hostuuid=11111111-2222-3333-4444-555555555555

[freebsd.sysctl]
kern.ipc.maxsockbuf=16777216
kern.ipc.somaxconn=128
net.inet.tcp.delayed_ack=0

[kni]
enable=1
method=accept
kni_action=default
tcp_port=80,443
udp_port=53

[pcap]
enable=1
snap_len=94
save_len=10485760
save_path=/tmp/test_pcap
timestamp_precision=0

[stack]
kernel_coexist=0
