; R-F thash_adjust=0 fixture: route② soft-scan fallback explicitly enabled.
; Mirrors valid_dpdk_full.ini layout but [rss_check] adds thash_adjust=0.
[dpdk]
lcore_mask=0x1
channel=4
memory=128
no_huge=0
promiscuous=1
numa_on=1
nb_vdev=0
nb_bond=0
port_list=0

[port0]
addr=192.168.1.10
netmask=255.255.255.0
broadcast=192.168.1.255
gateway=192.168.1.1
lcore_list=0

[rss_check]
enable=1
thash_adjust=0
rss_tbl=0 192.168.1.10 10.0.0.100 80

[freebsd.boot]
hz=100
