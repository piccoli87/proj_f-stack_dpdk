[dpdk]
lcore_mask=0x3
channel=4
promiscuous=1
numa_on=1
base_virtaddr=0x200000000
file_prefix=mytest
allow=0000:01:00.0,0000:01:00.1
nb_vdev=1
nb_bond=1
port_list=0

[port0]
addr=192.168.1.10
netmask=255.255.255.0
broadcast=192.168.1.255
gateway=192.168.1.1
lcore_list=0,1

[vdev0]
iface=net_pcap0
path=/tmp/x
queues=2
queue_size=512
mac=00:11:22:33:44:55
cq=1

[bond0]
mode=4
slave=eth0,eth1
primary=eth0
socket_id=0
mac=00:11:22:33:44:55
xmit_policy=l34
lsc_poll_period_ms=100
up_delay=200
down_delay=300

[freebsd.boot]
hz=100
