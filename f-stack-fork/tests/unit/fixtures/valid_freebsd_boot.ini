[dpdk]
lcore_mask=3
channel=4
port_list=0

[port0]
addr=192.168.1.10
netmask=255.255.255.0
broadcast=192.168.1.255
gateway=192.168.1.1

[freebsd.boot]
hz=200
physmem=536870912
fd_reserve=0
mem_size=512
panicstr=hello

[freebsd.sysctl]
kern.ipc.somaxconn=2048
kern.ipc.maxsockets=65536
net.inet.tcp.fast_finwait2_recycle=1
net.inet.tcp.sendspace=32768
net.inet.tcp.recvspace=32768
