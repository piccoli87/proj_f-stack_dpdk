; Comprehensive DPDK fixture (Stage-6 Phase-2):
; exercise hex lcore_mask + multi-port + bond + rss_check/rss_tbl
[dpdk]
lcore_mask=0xF
channel=4
memory=128
no_huge=0
promiscuous=1
numa_on=1
tso=0
vlan_strip=1
vlan_filter=10,20
nb_vdev=0
nb_bond=1
log_level=4
fstack_log_level=7
fstack_log_file_prefix=./test_log_
idle_sleep=20
pkt_tx_delay=100
symmetric_rss=1
port_list=0-1

[port0]
addr=192.168.1.10
netmask=255.255.255.0
broadcast=192.168.1.255
gateway=192.168.1.1
if_name=ens0
lcore_list=0,1
vip_addr=10.0.0.1;10.0.0.2;10.0.0.3
vip6_addr=fe80::1;fe80::2

[port1]
addr=192.168.2.10
netmask=255.255.255.0
broadcast=192.168.2.255
gateway=192.168.2.1
lcore_list=2-3

[vlan0]
vlan_id=10
addr=10.0.10.10
netmask=255.255.255.0
broadcast=10.0.10.255
gateway=10.0.10.1

[bond0]
mode=4
slave=eth0,eth1
primary=eth0
socket_id=0
mac=00:11:22:33:44:55
xmit_policy=l34
lsc_poll_period_ms=100
up_delay=200
down_delay=200

[rss_check]
enable=1
rss_tbl=0 192.168.1.10 10.0.0.100 80;1 192.168.2.10 10.0.0.200 443

[freebsd.boot]
hz=100
physmem=268435456
fd_reserve=1024
mem_size=256
hostuuid=11111111-2222-3333-4444-555555555555

[freebsd.sysctl]
kern.ipc.maxsockbuf=16777216
kern.ipc.somaxconn=128
net.inet.tcp.delayed_ack=0
