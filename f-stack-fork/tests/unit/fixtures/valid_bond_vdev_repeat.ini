[dpdk]
lcore_mask=0x3
channel=4
promiscuous=1
numa_on=1
nb_vdev=1
nb_bond=1
port_list=0

[port0]
addr=192.168.1.10
netmask=255.255.255.0
broadcast=192.168.1.255
gateway=192.168.1.1
lcore_list=0,1

[vdev0]
iface=net_pcap_a
iface=net_pcap_b
path=/tmp/a
path=/tmp/b
mac=00:11:22:33:44:55
mac=66:77:88:99:AA:BB

[bond0]
mode=4
slave=eth0
slave=eth0,eth1
primary=eth0
primary=eth1
mac=00:11:22:33:44:55
mac=CC:DD:EE:FF:00:11
xmit_policy=l2
xmit_policy=l34

[freebsd.boot]
hz=100
